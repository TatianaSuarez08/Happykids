 <main class="bg-light min-vh-100 d-flex justify-content-center align-items-center"> 
  <div class="container">

    <div class="card p-4 shadow" style="max-width: 700px; margin:auto;">

      <div class="d-flex justify-content-end">
        <button type="button" class="btn-close"></button>
      </div>

      <h2 class="text-center mb-4">Registrar Usuario</h2>

      <form id="formulario" class="row g-3">

        <div class="col-md-6">
          <label class="form-label">Nombres</label>
          <input type="text" id="nombres" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Apellido</label>
          <input type="text" id="apellido" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Usuario</label>
          <div class="input-group">
            <span class="input-group-text">@</span>
            <input type="text" id="usuario" class="form-control" required>
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label">Correo</label>
          <input type="email" id="correo" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Contraseña</label>
          <input type="password" id="password" class="form-control" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Confirmar contraseña</label>
          <input type="password" id="confirmar" class="form-control" required>
        </div>

        <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="terminos" required>
            <label class="form-check-label">
              Aceptar términos y condiciones
            </label>
          </div>
        </div>

        <button type="submit" class="btn btn-success w-100">
          Registrarse
        </button>

      </form>

    </div>
  </div>
</main>

<script>
const form = document.getElementById("formulario");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const password = document.getElementById("password").value;
  const confirmar = document.getElementById("confirmar").value;

  if (password !== confirmar) {
    alert("Las contraseñas no coinciden ❌");
    return;
  }

  alert("Usuario registrado correctamente ✅");

  form.reset();
});
</script>
